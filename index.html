<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Lab 6</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    margin-top: 100px;
}

h2 {
    font-size: 40px;
}

.btn {
    background-color: #eee;
    border: none;
    padding: 15px 25px;
    font-size: 20px;
    border-radius: 10px;
    margin: 10px;
    cursor: pointer;
}

.count {
    font-size: 25px;
    margin-left: 10px;
}

textarea {
    width: 300px;
    height: 100px;
    margin-top: 20px;
    font-size: 16px;
}

.smallBtn {
    padding: 10px 20px;
    margin: 10px;
    font-size: 16px;
}
</style>

</head>
<body>

<h2>Like or Dislike</h2>

<button class="btn" onclick="like()">👍 <span id="like" class="count">0</span></button>

<button class="btn" onclick="dislike()">👎 <span id="dislike" class="count">0</span></button>

<br>

<textarea id="comment" placeholder="Write comment"></textarea><br>

<button class="smallBtn" onclick="addComment()">Submit</button>

<div id="comments"></div>

<br>
<button class="smallBtn" onclick="resetAll()">Reset</button>

<script>

let likeCount = 0;
let dislikeCount = 0;
let comments = [];

if (document.cookie.includes("like=")) {
    likeCount = Number(getCookie("like"));
    document.getElementById("like").innerText = likeCount;
}

if (document.cookie.includes("dislike=")) {
    dislikeCount = Number(getCookie("dislike"));
    document.getElementById("dislike").innerText = dislikeCount;
}

if (document.cookie.includes("comments=")) {
    comments = JSON.parse(getCookie("comments"));
    showComments();
}

function like() {
    if (getCookie("voted")) {
        alert("You already voted");
        return;
    }

    likeCount++;
    document.getElementById("like").innerText = likeCount;

    document.cookie = "like=" + likeCount;
    document.cookie = "voted=yes";
}

function dislike() {
    if (getCookie("voted")) {
        alert("You already voted");
        return;
    }

    dislikeCount++;
    document.getElementById("dislike").innerText = dislikeCount;

    document.cookie = "dislike=" + dislikeCount;
    document.cookie = "voted=yes";
}

function addComment() {
    if (getCookie("commented")) {
        alert("You already commented");
        return;
    }

    let text = document.getElementById("comment").value;

    if (text == "") return;

    comments.push(text);
    document.cookie = "comments=" + JSON.stringify(comments);
    document.cookie = "commented=yes";

    showComments();
    document.getElementById("comment").value = "";
}

function showComments() {
    let div = document.getElementById("comments");
    div.innerHTML = "";

    for (let i = 0; i < comments.length; i++) {
        div.innerHTML += "<p>" + comments[i] + "</p>";
    }
}

function resetAll() {
    document.cookie = "like=0";
    document.cookie = "dislike=0";
    document.cookie = "comments=[]";
    document.cookie = "voted=";
    document.cookie = "commented=";

    likeCount = 0;
    dislikeCount = 0;
    comments = [];

    document.getElementById("like").innerText = 0;
    document.getElementById("dislike").innerText = 0;
    document.getElementById("comments").innerHTML = "";
}


function getCookie(name) {
    let c = document.cookie.split("; ");
    for (let i = 0; i < c.length; i++) {
        let parts = c[i].split("=");
        if (parts[0] == name) return parts[1];
    }
    return "";
}

</script>

</body>
</html>
